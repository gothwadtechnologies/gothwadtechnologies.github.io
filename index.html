<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Instant Redirect: Script ko upar rakha hai taaki delay na ho -->
    <script type="text/javascript">
        window.location.replace("https://gxchatindia.vercel.app");
    </script>
    
    <!-- Fallback Redirect (Agar JS block ho) -->
    <meta http-equiv="refresh" content="0; url=https://gxchatindia.vercel.app">

    <!-- SEO & Search Result Branding -->
    <title>Gothwad Technologies</title>
    <meta name="description" content="Welcome to Gothwad Technologies. We are redirecting you to GX Chat India for the best experience.">
    <meta name="robots" content="index, follow">

    <!-- Favicon (Ye Google Search me aapka logo dikhayega) -->
    <link rel="icon" type="image/png" href="https://gothwadtechnologies.github.io/favicon.png">
    <link rel="apple-touch-icon" href="https://gothwadtechnologies.github.io/favicon.png">

    <!-- Schema Markup (Logo aur Name confirm karne ke liye) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Gothwad Technologies",
      "url": "https://gothwadtechnologies.github.io/",
      "logo": "https://gothwadtechnologies.github.io/favicon.png"
    }
    </script>

    <style>
        /* Screen ko blank rakhne ke liye jab tak redirect ho */
        body { background: #ffffff; display: none; }
    </style>
</head>
<body>
    <!-- User ko ye dikhne ka mauka hi nahi milega -->
</body>
</html>
